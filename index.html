<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ni Apps</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f6f9;
}

/* HEADER */
header {
  background: linear-gradient(135deg, orange, #ff6a00);
  color: white;
  padding: 30px;
  text-align: center;
  font-size: 24px;
  font-weight: bold;
}

/* CONTAINER */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
  padding: 20px;
}

/* CARD */
.card {
  background: white;
  border-radius: 15px;
  padding: 20px;
  text-align: center;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  width: 100px;
  border-radius: 20px;
}

.title {
  font-size: 20px;
  margin: 10px 0;
}

.desc {
  color: gray;
  font-size: 14px;
}

button {
  margin-top: 15px;
  background: orange;
  border: none;
  color: white;
  padding: 12px 20px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 16px;
}

button:hover {
  background: #ff6a00;
}

.qr {
  margin-top: 10px;
  width: 100px;
}

/* FOOTER */
footer {
  background: #1e1e1e;
  color: white;
  text-align: center;
  padding: 25px 15px;
  margin-top: 40px;
}

footer h3 {
  margin: 0;
  font-size: 22px;
}

footer p {
  font-size: 14px;
  color: #bbb;
  margin: 10px 0;
}

.social {
  margin-top: 15px;
}

.social a {
  display: inline-block;
  margin: 0 10px;
  transition: 0.3s;
}

.social img {
  width: 35px;
  height: 35px;
  filter: brightness(0) invert(1);
}

.social a:hover {
  transform: scale(1.2);
}
</style>

</head>

<body>

<header>📱 Ni Apps</header>

<!-- APPS CONTAINER -->
<div class="container">

  <div class="card">
    <img src="app1.png">
    <div class="title">Marhxox</div>
    <div class="desc">Marhxoxoti App kinni kitab gantih ak yane.</div>
    <a href="app1.apk" download>
      <button>⬇ Ullus</button>
    </a>
    <img class="qr" src="qr1.png">
  </div>


</div>

<!-- FOOTER -->
<footer>
  <h3>📱 Ni Apps</h3>
  <p>Basak yarhxe ni App ta kalooko obsita </p>

  <div class="social">
    <a href="https://www.facebook.com/SaahoNiiro" target="_blank">
      <img src="facebook.png">
    </a>

    <a href="#" target="_blank">
      <img src="instagram.png">
    </a>

    <a href="#" target="_blank">
      <img src="whatsapp.png">
    </a>
  </div>

  <p style="margin-top:15px; font-size:12px; color:#777;">
    © 2026 Ni Apps - All Rights Reserved
  </p>
</footer>

</body>
</html>
